<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Delete Event Confirmation</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">

<nav class="bg-black text-white p-4">
    <div class="container mx-auto flex items-center gap-6">
        <span class="text-xl font-bold">Campus Clubs</span>
        <a href="#" class="text-gray-300 hover:text-white">Clubs</a>
        <a href="#" class="text-gray-300 hover:text-white">Events</a>
    </div>
</nav>

<main class="container mx-auto p-8">
    <h1 class="text-3xl font-bold mb-4">Delete Event</h1>
    <p class="text-gray-600 mb-6">Are you sure you want to delete the following event?</p>

    <div class="bg-white border rounded shadow-sm p-6 space-y-4 max-w-lg">
        <div>
            <span class="font-semibold text-gray-700 block">Name</span>
            <span class="text-gray-800" th:text="${event.name}">Event Name</span>
        </div>
        <div>
            <span class="font-semibold text-gray-700 block">Date</span>
            <span class="text-gray-800" th:text="${#temporals.format(event.date, 'dd MMM yyyy')}">10 Mar 2026</span>
        </div>
        <div>
            <span class="font-semibold text-gray-700 block">Type</span>
            <span class="text-gray-800" th:text="${event.type}">TYPE</span>
        </div>
        <div>
            <span class="font-semibold text-gray-700 block">Location</span>
            <span class="text-gray-800" th:text="${event.location}">Location</span>
        </div>
        <div>
            <span class="font-semibold text-gray-700 block">Club</span>
            <span class="text-gray-800" th:text="${event.clubName}">Club Name</span>
        </div>

        <div class="flex gap-2 pt-2">
            <form th:action="@{/clubs/{clubId}/events/{eventId}(clubId=${event.clubId}, eventId=${event.id})}" method="post">
                <input type="hidden" name="_method" value="delete"/>
                <button type="submit" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">Yes, Delete</button>
            </form>
            <a href="/events" class="border px-4 py-2 rounded hover:bg-gray-100">Cancel</a>
        </div>
    </div>
</main>

</body>
</html>
