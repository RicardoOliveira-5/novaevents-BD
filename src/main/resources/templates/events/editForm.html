<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Edit Event')}"></head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>

<div class="container mt-4">

    <h1 class="fw-bold">Edit Event</h1>

    <form th:action="@{/clubs/{id}/events/{eventId}(id=${club.id}, eventId=${event.id})}"
          th:object="${eventUpdateForm}"
          method="post">
          class="mt-4">

        <!-- Method override para PUT -->
        <input type="hidden" name="_method" value="PUT"/>

        <!-- Name -->
        <div class="mb-3">
            <label for="name" class="form-label">Event Name *</label>
            <input type="text" id="name" class="form-control"
                   th:field="*{name}"
                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                   placeholder="Event name"/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}">
                <small th:errors="*{name}"></small>
            </div>
        </div>

        <!-- Date -->
        <div class="mb-3">
            <label for="date" class="form-label">Date *</label>
            <input type="date" id="date" class="form-control"
                   th:field="*{date}"
                   th:classappend="${#fields.hasErrors('date')} ? 'is-invalid'"/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('date')}">
                <small th:errors="*{date}"></small>
            </div>
        </div>

        <!-- Type -->
        <div class="mb-3">
            <label for="type" class="form-label">Event Type *</label>
            <select id="type" class="form-select"
                    th:field="*{type}"
                    th:classappend="${#fields.hasErrors('type')} ? 'is-invalid'">
                <option value="">Select a type</option>
                <option th:each="t : ${eventTypes}"
                        th:value="${t}"
                        th:text="${t}">
                </option>
            </select>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('type')}">
                <small th:errors="*{type}"></small>
            </div>
        </div>

        <!-- Location -->
        <div class="mb-3">
            <label for="location" class="form-label">Location</label>
            <input type="text" id="location" class="form-control"
                   th:field="*{location}"
                   placeholder="Location (optional)"/>
        </div>

        <!-- Description -->
        <div class="mb-4">
            <label for="description" class="form-label">Description</label>
            <textarea id="description" class="form-control" rows="3"
                      th:field="*{description}"
                      placeholder="Optional description"></textarea>
        </div>

        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a th:href="@{/clubs/{id}/events/{eventId}(id=${club.id}, eventId=${event.id})}"
           class="btn btn-outline-secondary ms-2">Cancel</a>

    </form>
</div>

<th:block th:replace="~{layout :: scripts}"></th:block>
</body>
</html>
