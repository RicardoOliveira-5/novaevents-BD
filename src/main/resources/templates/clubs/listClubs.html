<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Clubs</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
        <head th:replace="/layout :: head('Events')"></head>

        <div th:replace="/layout" :: navbar></div>


<div class="container mt-4">

    <h1>Campus Clubs</h1>

    <table class="table table-striped">

        <thead>
        <tr>
            <th>Name</th>
            <th>Category</th>
            <th>Description</th>
            <th>Details</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="club : ${clubs}">

            <td>
                <a th:href="@{/clubs/{id}(id=${club.id})}"
                   th:text="${club.name}">
                </a>
            </td>

            <td th:text="${club.category}"></td>

            <td>
                <details>
                    <summary>View description</summary>
                    <p th:text="${club.description}"></p>
                </details>
            </td>

            <td>
                <a class="btn btn-primary btn-sm"
                   th:href="@{/clubs/{id}(id=${club.id})}">
                    View Details
                </a>
            </td>

        </tr>

        </tbody>

    </table>

</div>



</body>
</html>
